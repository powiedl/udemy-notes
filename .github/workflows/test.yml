name: PR Tests

on:
  pull_request:
    branches: ['master']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  test:
    name: Run Unit/Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      # 1. pnpm v11 installieren (passend zu deinem neuen lokalen Setup)
      - name: pnpm installieren
        uses: pnpm/action-setup@v4
        with:
          version: 11

      # 2. Node 24 aufsetzen und pnpm Cache aktivieren
      - name: Node.js aufsetzen
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      # 3. Dependencies strikt anhand der pnpm-lock.yaml installieren
      - name: Dependencies installieren
        run: pnpm install --frozen-lockfile

      # 4. Sicherheits-Check (pnpm audit)
      - name: Abhängigkeiten auf Sicherheitslücken prüfen
        run: pnpm audit --audit-level=high
        # Erklärung zu --audit-level weiter unten!

      # 5. Tests ausführen
      - name: Tests ausführen
        run: pnpm run test
